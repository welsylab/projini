image: rust:latest

stages:
  - build
  - test
  - code_quality # Renamed stage for clarity

variables:
  CARGO_TERM_COLOR: always
  # SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # This is often handled by the scanner image, but can be kept if needed for caching
  GIT_DEPTH: "0"

fmt:
  stage: build
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check
  allow_failure: true

clippy:
  stage: build
  script:
    - rustup component add clippy
    - cargo clippy --workspace --all-targets --all-features -- -D warnings
  allow_failure: true

build:
  stage: build
  script:
    - cargo build --workspace

test:
  stage: test
  script:
    - cargo test --workspace

# SonarCloud check
sonarcloud-check:
  stage: code_quality # Use the new stage name
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    # These variables should be configured in your GitLab CI/CD settings:
    # - SONAR_TOKEN: A secret token for SonarCloud authentication.
    # - SONAR_ORGANIZATION_KEY: Your SonarCloud organization key.
    # - SONAR_PROJECT_KEY: Your SonarCloud project key.
    #
    # Using GitLab predefined variables as examples - replace if your SonarCloud keys are different:
    SONAR_ORGANIZATION_KEY: $CI_PROJECT_NAMESPACE # Example: Use GitLab namespace as organization key
    SONAR_PROJECT_KEY: $CI_PROJECT_PATH_SLUG      # Example: Use GitLab project path slug as project key
    SONAR_TOKEN: $SONAR_SONARCLOUD_TOKEN         # This should be a masked secret variable in GitLab CI/CD settings
  script:
    - echo "Running SonarCloud analysis..."
    - |
      sonar-scanner \
        -Dsonar.organization.key=$SONAR_ORGANIZATION_KEY \
        -Dsonar.projectKey=$SONAR_PROJECT_KEY \
        -Dsonar.sources=. \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.login=$SONAR_TOKEN
  # The original config had `only: [merge_requests, master, develop]` and `allow_failure: true`.
  # I'll keep `allow_failure: true` for now, but suggest the user review it.
  # `only` clause might need adjustment based on desired behavior.
  only:
    - merge_requests
    - master
    - develop
  allow_failure: true
