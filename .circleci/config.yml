version: 2.1

jobs:
  build:
    docker:
      - image: cimg/rust:1.93.1
    steps:
      - checkout
      - run: rustup component add clippy rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

workflows:
  build_and_test:
    jobs:
      - build
